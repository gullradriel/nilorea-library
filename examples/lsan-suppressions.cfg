# LeakSanitizer suppressions for system/driver libraries.
# These leaks originate inside system libraries — not in nilorea code.
#
# Usage: LSAN_OPTIONS=suppressions=examples/lsan-suppressions.cfg ./examples/ex_gui

# Mesa / Gallium GPU driver internals
leak:libgallium
leak:libGLX_mesa
leak:libdrm_amdgpu
leak:libdrm

# X11 / XCB protocol layer
leak:libxcb
leak:libX11

# EGL / GLX loader
leak:libEGL
leak:libGLX

# OpenSSL — does not free all global state on exit (CRYPTO_malloc, etc.)
leak:libcrypto
leak:libssl
