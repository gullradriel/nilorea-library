#
# Valgrind suppression file for nilorea-library examples.
#
# Suppresses common (not fatal) false positives from system libraries
# (glibc, pthreads, zlib, OpenSSL, librdkafka) that are not caused by
# nilorea code.
#
# Based on the MySQL/glibc suppression set; trimmed to keep only the
# entries relevant to nilorea's dependencies.
#

# ============================================================
# pthreads / glibc TLS allocations
# ============================================================
# Pthread does not free all thread-local storage before program exit.

{
   pthread_allocate_tls_1
   Memcheck:Leak
   fun:calloc
   fun:_dl_allocate_tls
   fun:allocate_stack
   fun:pthread_create*
}

{
   pthread_allocate_tls_2
   Memcheck:Leak
   fun:calloc
   fun:_dl_allocate_tls
   fun:pthread_create*
}

{
   pthread_allocate_tls_3
   Memcheck:Leak
   fun:calloc
   obj:/lib*/ld*.so
   fun:_dl_allocate_tls
   fun:pthread_create*
}

{
   pthread_allocate_dtv_1
   Memcheck:Leak
   fun:calloc
   fun:allocate_dtv
   fun:_dl_allocate_tls_storage
   fun:__GI__dl_allocate_tls
   fun:pthread_create
}

{
   pthread_allocate_dtv_2
   Memcheck:Leak
   fun:calloc
   fun:allocate_dtv
   fun:_dl_allocate_tls
   fun:pthread_create*
}

{
   pthread_memalign_tls
   Memcheck:Leak
   fun:memalign
   fun:_dl_allocate_tls_storage
   fun:__GI__dl_allocate_tls
   fun:pthread_create
}

{
   pthread_allocate_tls_glibc261
   Memcheck:Leak
   fun:calloc
   obj:*/ld-*.so
   fun:_dl_allocate_tls
   fun:pthread_create*
}

{
   pthread_tls_possible_leak
   Memcheck:Leak
   match-leak-kinds: possible
   fun:calloc
   fun:allocate_dtv
   fun:_dl_allocate_tls
   fun:allocate_stack
}

# glibc 2.34+ wraps calloc through rtld-malloc.h, producing an extra
# stack frame (calloc -> calloc -> allocate_dtv) that the rules above
# do not match.  The wildcard "..." covers any number of intermediate
# frames between calloc and allocate_dtv.

{
   pthread_allocate_dtv_glibc234
   Memcheck:Leak
   match-leak-kinds: possible
   fun:calloc
   ...
   fun:allocate_dtv
   fun:_dl_allocate_tls
   fun:allocate_stack
   fun:pthread_create*
}

{
   pthread_allocate_tls_glibc234
   Memcheck:Leak
   fun:calloc
   ...
   fun:allocate_dtv
   fun:_dl_allocate_tls
   fun:allocate_stack
   fun:pthread_create*
}

