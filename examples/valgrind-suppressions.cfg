# glibc 2.35+ _dl_find_object infrastructure allocates internal
# mappings via _dlfo_mappings_segment_allocate during dlopen.
# Reported as "possibly lost" because the pointer is only reachable
# through glibc-internal data structures.

{
   dlopen_find_object_possible
   Memcheck:Leak
   match-leak-kinds: possible
   fun:malloc
   ...
   fun:_dl_find_object_update*
   ...
   fun:_dl_open
}

{
   dlopen_find_object_segment
   Memcheck:Leak
   match-leak-kinds: possible
   fun:malloc
   ...
   fun:_dlfo_mappings_segment_allocate
   ...
   fun:_dl_open
}

{
   dlopen_threaded_leak
   Memcheck:Leak
   fun:calloc
   obj:*/libdl-*.so
   fun:dlopen*
}

{
   do_lookup_x_leak
   Memcheck:Leak
   fun:calloc
   fun:do_lookup_x
   fun:_dl_lookup_symbol_x
