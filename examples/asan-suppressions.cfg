#
# AddressSanitizer (LeakSanitizer) suppression file for nilorea-library examples.
#
# Suppresses known false-positive memory leaks from system graphics/display
# libraries that allocate at init and never free before exit.
#
# Usage:
#   LSAN_OPTIONS=suppressions=examples/asan-suppressions.cfg ./examples/ex_gui
#
# Or set in environment:
#   export LSAN_OPTIONS=suppressions=examples/asan-suppressions.cfg
#

# Mesa OpenGL / Gallium driver
leak:libgallium
leak:libGLX_mesa

# X11 / XCB
leak:libxcb.so

# DRM (AMD, Intel, etc.)
leak:libdrm_amdgpu
leak:libdrm_intel
leak:libdrm.so

# X11 display libs
leak:libX11.so
leak:libXext.so

# Allegro 5 internal display init
leak:liballegro.so
