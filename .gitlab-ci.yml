image: gcc:bookworm

include:
  # 1. SAST - Static Application Security Testing
  - template: Security/SAST.gitlab-ci.yml
  # 2. IaC Scanning - Infrastructure as Code
  - template: Security/SAST-IaC.gitlab-ci.yml
  # 3. Container Scanning
  - template: Security/Container-Scanning.gitlab-ci.yml
  # 4. Secret Detection
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - build
  - tests
  - scans
  - deploy

# -----------------------------------------
# Override stages to match your pipeline stages
# -----------------------------------------
sast:
  stage: scans
  image: "$SAST_ANALYZER_IMAGE"   # Let the template use its own image, not gcc:bookworm

iac-sast:
  stage: scans
  image: "$SAST_ANALYZER_IMAGE"   # Same -- don't force gcc:bookworm on security scanners

container_scanning:
  stage: scans
  needs: []                       # No dependency needed -- we scan the base gcc:bookworm image directly
  variables:
    # You don't build a Docker image in this pipeline, so scan your base image instead.
    # If you later add a docker build job, replace this with $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    CS_IMAGE: "gcc:bookworm"
    # CS_DOCKERFILE_PATH and GIT_STRATEGY are optional here since we're scanning an upstream image
    GIT_STRATEGY: none            # No need to clone repo just to scan gcc:bookworm

secret_detection:
  stage: scans

# -----------------------------------------
# Cache for apt packages
# -----------------------------------------
cache:
  key: apt-cache
  paths:
    - $CI_PROJECT_DIR/.apt

# -----------------------------------------
# Reusable script anchors
# -----------------------------------------
.setup_apt: &setup_apt
  - |
    if [ "$USE_PROXY" == "1" ]
    then
      echo "$APT_PROXY" > /etc/apt/apt.conf.d/proxy.conf
      export http_proxy="$http_proxy"
      export https_proxy="$https_proxy"
      export ftp_proxy="$ftp_proxy"
      git config --global http.proxy "$http_proxy"
      git config --global http.proxyAuthMethod 'basic'
    fi
    export APT_DIR=.apt
    export APT_STATE_LISTS=$APT_DIR/lists
    export APT_CACHE_ARCHIVES=$APT_DIR/archives
    mkdir -p $APT_CACHE_ARCHIVES/partial $APT_STATE_LISTS
    rm -f /etc/apt/apt.conf.d/docker-clean
    apt-get -o Dir::Cache::archives="$APT_CACHE_ARCHIVES" -o Dir::State::lists="$APT_STATE_LISTS" update -yq
    apt-get -o Dir::Cache::archives="$APT_CACHE_ARCHIVES" -o Dir::State::lists="$APT_STATE_LISTS" install -y liballegro5-dev libpcre2-dev libssl-dev libsasl2-dev doxygen graphviz cppcheck clang-tools

.integrate_deps: &integrate_deps
  - make integrate-deps

.make_lib: &make_lib
  - make DEBUG=1 -j 6

.make_examples: &make_examples
  - make DEBUG=1 -j 6 examples

.make_lib_tsan: &make_lib_tsan
  - make DEBUG=1 DEBUG_THREADS=1 -j 6

.make_examples_tsan: &make_examples_tsan
  - make DEBUG=1 DEBUG_THREADS=1 -j 6 examples

# -----------------------------------------
# Build jobs
# -----------------------------------------
build_lib:
  stage: build
  script:
    - *setup_apt
    - *integrate_deps
    - *make_lib
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/libnilorea.a
    expire_in: 1 week

build_examples:
  stage: build
  script:
    - *setup_apt
    - *integrate_deps
    - *make_lib
    - *make_examples
  artifacts:
    paths:
      - ${CI_PROJECT_DIR}/examples/ex_*
      - ${CI_PROJECT_DIR}/examples/libnilorea.so
      - ${CI_PROJECT_DIR}/examples/librdkafka.so*
      - ${CI_PROJECT_DIR}/libnilorea.a
      - ${CI_PROJECT_DIR}/libnilorea.so
    expire_in: 1 week

# -----------------------------------------
# TSan build — parallel to build_examples, separate artifact
# -----------------------------------------
build_examples_tsan:
  stage: build
  script:
    - *setup_apt
    - *integrate_deps
    - *make_lib_tsan
    - *make_examples_tsan
  artifacts:
    name: tsan-build
    paths:
      - ${CI_PROJECT_DIR}/examples/ex_*
      - ${CI_PROJECT_DIR}/examples/libnilorea.so
      - ${CI_PROJECT_DIR}/examples/librdkafka.so*
      - ${CI_PROJECT_DIR}/libnilorea.a
      - ${CI_PROJECT_DIR}/libnilorea.so
    expire_in: 1 week

# -----------------------------------------
# Test jobs — consume build artifacts, no rebuild
# -----------------------------------------
tests:
  stage: tests
  needs:
    - job: build_examples
      artifacts: true
  script:
    - *setup_apt
    - cd examples
    - chmod +x run_tests.sh ex_*
    - ./run_tests.sh

tests_tsan:
  stage: tests
  needs:
    - job: build_examples_tsan
      artifacts: true
  script:
    - *setup_apt
    - cd examples
    - chmod +x run_tests.sh ex_*
    - ./run_tests.sh

# -----------------------------------------
# Static analysis — cppcheck (gating) + scan-build (gating via SCAN_BUILD_STATUS_BUGS=1)
# Runs in parallel with the build/test chain (no needs).
# -----------------------------------------
static_analysis:
  stage: scans
  needs: []
  script:
    - *setup_apt
    - *integrate_deps
    - make check SCAN_BUILD_STATUS_BUGS=1

# -----------------------------------------
# Documentation generation
# -----------------------------------------
pages:
  stage: deploy
  script:
    - *setup_apt
    - *integrate_deps
    - doxygen Doxyfile
    - mv html public
  artifacts:
    paths:
      - public
  only:
    - main
